<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description" content="Raad welk Tweede Kamerlid je ziet — en ontdek een raar feitje.">
  <meta name="theme-color" content="#F5F3EF">
  <title>Ken je Kamerlid</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="styles.css">
</head>
<body data-state="loading">

  <div id="app">

    <!-- ── Header ──────────────────────────────────────────────────── -->
    <header id="site-header">
      <div id="header-title">
        <span class="title-kicker">Tweede Kamer</span>
        <h1>Ken je Kamerlid</h1>
      </div>
      <div id="streak" aria-live="polite" aria-label="Aantal geziene kamerleden">
        🔥 <span id="streak-count">0</span> onthuld
      </div>
    </header>

    <!-- ── Main content area ───────────────────────────────────────── -->
    <main id="main">

      <!-- Loading / error state -->
      <p id="status-msg" role="status" aria-live="assertive"></p>

      <!-- MP photo card -->
      <div id="card" aria-label="Kamerlid kaart">
        <!-- Party colour strip — hidden in cover state -->
        <div id="party-strip" aria-hidden="true"></div>

        <!-- Identity — hidden in cover state -->
        <div id="identity">
          <div id="identity-top">
            <img id="party-logo" src="" alt="" loading="eager">
            <div id="identity-text">
              <div id="mp-name"></div>
              <div id="mp-party-label"></div>
            </div>
          </div>
          <div id="mp-meta"></div>
        </div>

        <!-- Photo fills remaining height -->
        <div id="photo-wrap">
          <img id="photo" src="" alt="" draggable="false">
        </div>
      </div>

      <!-- Fact card — slides up on reveal, z-index above photo card -->
      <div id="fact-card" role="region" aria-label="Raar feitje">
        <span id="fact-eyebrow">Raar Feitje</span>
        <blockquote id="fact-text"></blockquote>
        <div id="share-buttons">
          <button id="wa-btn" type="button" class="share-btn">
            💬 Deel via WhatsApp
          </button>
          <button id="copy-btn" type="button" class="share-btn">
            📋 Kopieer
          </button>
        </div>
      </div>

    </main>

    <!-- ── Action bar — always visible at bottom ──────────────────── -->
    <div id="action-bar">
      <!-- Hint shown on very first card only -->
      <p id="hint">Raad het Kamerlid — druk op de knop om te onthullen.</p>

      <!-- COVER state: reveal button -->
      <button id="reveal-btn" type="button">Onthullen →</button>

      <!-- FACT state: next button -->
      <button id="next-btn" type="button">Volgende Kamerlid →</button>
    </div>

  </div><!-- /#app -->

  <script src="script.js"></script>
</body>
</html>
